name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Go race tests
        run: go test -race ./...
      - name: Anonymization corpus
        run: go run ./test/anonymization
      - name: Node tests
        run: npm test
      - name: Python syntax and tests
        run: |
          python -m compileall -q sidecar/gliner
          python -m unittest discover -s sidecar/gliner/tests -v
      - name: Validate Compose
        env:
          KLOVIS_GLINER_MODEL: test/model
          KLOVIS_GLINER_MODEL_REVISION: immutable-test-revision
          KLOVIS_GLINER_DATA_DIR: /tmp/klovis-gliner
        run: docker compose -f sidecar/gliner/compose.yaml config --quiet
      - name: Verify npm package contents
        run: |
          npm pack --dry-run --json > npm-pack.json
          node -e "const p=require('./npm-pack.json')[0].files.map(x=>x.path); for (const f of ['sidecar/gliner/Dockerfile','sidecar/gliner/compose.yaml','sidecar/gliner/server.py']) if (!p.includes(f)) throw new Error('missing '+f)"

  sidecar-multiarch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build CPU image for supported Linux architectures
        uses: docker/build-push-action@v6
        with:
          context: sidecar/gliner
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
