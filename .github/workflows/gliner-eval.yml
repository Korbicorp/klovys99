name: gliner-eval

on:
  workflow_dispatch:
    inputs:
      model:
        description: Pinned Hugging Face model identifier
        required: true
      revision:
        description: Immutable Hugging Face commit SHA
        required: true
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  evaluate:
    if: ${{ github.event_name == 'workflow_dispatch' || (vars.KLOVIS_GLINER_MODEL != '' && vars.KLOVIS_GLINER_MODEL_REVISION != '') }}
    runs-on: ubuntu-latest
    env:
      KLOVIS_GLINER_MODEL: ${{ inputs.model || vars.KLOVIS_GLINER_MODEL }}
      KLOVIS_GLINER_MODEL_REVISION: ${{ inputs.revision || vars.KLOVIS_GLINER_MODEL_REVISION }}
      KLOVIS_GLINER_DATA_DIR: /tmp/klovis-gliner
      KLOVIS_GLINER_URL: http://127.0.0.1:8091
      KLOVIS_GLINER_MODE: full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build pinned CPU sidecar
        run: docker build -t klovys99-gliner:local sidecar/gliner
      - name: Install pinned model explicitly
        run: |
          mkdir -p "$KLOVIS_GLINER_DATA_DIR"
          docker run --rm \
            -e GLINER_MODEL -e GLINER_MODEL_REVISION \
            -e GLINER_MODEL_DIR=/models/model \
            -v "$KLOVIS_GLINER_DATA_DIR:/models" \
            klovys99-gliner:local python /app/install_model.py
      - name: Start sidecar
        run: docker compose -f sidecar/gliner/compose.yaml up -d --no-build --wait
      - name: Evaluate regex, GLiNER and hybrid
        run: go run ./test/ner_eval | tee gliner-eval.json
      - uses: actions/upload-artifact@v4
        with:
          name: gliner-eval
          path: gliner-eval.json
      - if: always()
        run: docker compose -f sidecar/gliner/compose.yaml down
