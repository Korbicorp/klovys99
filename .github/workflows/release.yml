name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "package.json version ($package_version) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Run Go tests
        run: go test ./...

      - name: Run Node tests
        run: node --test npm/test/*.test.js

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: linux
            goarch: arm64
            extension: ""
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: arm64
            extension: ""
          - goos: windows
            goarch: amd64
            extension: ".exe"
          - goos: windows
            goarch: arm64
            extension: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            base_version=$(node -p "require('./package.json').version")
            version="${base_version}-main.${GITHUB_RUN_NUMBER}"
          fi
          mkdir -p dist
          asset_name="klovys99_${version}_${GOOS}_${GOARCH}${{ matrix.extension }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${asset_name}" ./cmd/klovys99

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="$GITHUB_REF_NAME"
            if gh release view "$release_tag" >/dev/null 2>&1; then
              gh release upload "$release_tag" dist/* --clobber
            else
              gh release create "$release_tag" dist/* --verify-tag --generate-notes
            fi
          else
            base_version=$(node -p "require('./package.json').version")
            release_tag="v${base_version}-main.${GITHUB_RUN_NUMBER}"
            gh release create "$release_tag" dist/* --target "$GITHUB_SHA" --generate-notes --prerelease
          fi

  npm-publish:
    needs: release
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN_KLOVYS: ${{ secrets.NPM_TOKEN_KLOVYS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish npm package
        if: ${{ env.NPM_TOKEN_KLOVYS != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN_KLOVYS }}
        run: |
          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            base_version=$(node -p "require('./package.json').version")
            package_version="${base_version}-main.${GITHUB_RUN_NUMBER}"
            npm version --no-git-tag-version "$package_version"
            npm publish --access public --tag main
          else
            package_version=$(node -p "require('./package.json').version")
            if npm view "klovys99@${package_version}" version >/dev/null 2>&1; then
              echo "npm version ${package_version} is already published, skipping publish"
              exit 0
            fi
            npm publish --access public
          fi
